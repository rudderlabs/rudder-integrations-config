name: Validate DisplayName Changes
permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'src/configurations/destinations/*/db-config.json'

jobs:
  validate-displayname:
    name: Check for displayName changes
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0 # Need full history to compare with base branch

      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}"

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Validate displayName changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          node scripts/validateDisplayNameChanges.js --compare "origin/${BASE_REF}"
